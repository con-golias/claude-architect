name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Build
        run: bun run build

      - name: Verify bundles exist
        run: |
          test -f scripts/mcp-server.cjs || (echo "Missing mcp-server.cjs" && exit 1)
          test -f scripts/worker-service.cjs || (echo "Missing worker-service.cjs" && exit 1)
          echo "All bundles present"
